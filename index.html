<!doctype html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نظام إدارة السوبر ماركت</title>
    <style>
        :root {
            --main: #2c3e50;
            --green: #27ae60;
            --light: #f4f7f6;
        }

        body {
            font-family: "Segoe UI", sans-serif;
            background: var(--light);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        input {
            padding: 12px;
            margin: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 150px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-add {
            background: var(--main);
            color: white;
        }

        .btn-pay {
            background: var(--green);
            color: white;
            width: 100%;
            font-size: 1.2rem;
            margin-top: 20px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .product-item {
            background: white;
            border: 1px solid #eee;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .product-item:hover {
            border-color: var(--green);
            transform: translateY(-3px);
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="main-content">
            <div class="card">
                <h2>إضافة منتج جديد للمخزن</h2>
                <div style="display: flex; flex-wrap: wrap; gap: 10px">
                    <input type="text" id="pName" placeholder="اسم المنتج" />
                    <input type="number" id="pPrice" placeholder="سعر الشراء" />
                    <input type="number" id="pSellPrice" placeholder="سعر البيع" />
                    <input type="number" id="pStock" placeholder="الكمية" />
                    <button class="btn btn-add" onclick="saveProduct()">
                        حفظ في جوجل شيت
                    </button>
                </div>
            </div>

            <div class="card" style="margin-top: 20px">
                <h2>المخزن الحالي (اضغط للبيع)</h2>
                <div id="productsDisplay" class="product-grid">جاري التحميل...</div>
            </div>
        </div>

        <div class="card">
            <h2>فاتورة الكاشير</h2>
            <div id="cartList" style="min-height: 250px"></div>
            <div style="
            font-size: 1.5rem;
            font-weight: bold;
            border-top: 2px solid #eee;
            padding-top: 15px;
          ">
                الإجمالي: <span id="grandTotal">0</span> ج.م
            </div>
            <button class="btn btn-pay" onclick="confirmSale()">
                تأكيد العملية وخصم المخزن
            </button>
        </div>
    </div>

    <script>
        const API =
            "https://script.google.com/macros/s/AKfycby6u9nwb_MTYtoaYWegczApnJ6VPXzfBWaeTNnwc6H2i2XxBGmYUk_0h9wF0l9lNALhxQ/exec";
        let cart = [];

        // جلب البيانات
        async function fetchStock() {
            const res = await fetch(API);
            const data = await res.json();
            const display = document.getElementById("productsDisplay");
            display.innerHTML = data
                .map(
                    (row) => `
            <div class="product-item" onclick="addToCart('${row[1]}', ${row[3]})">
                <b>${row[1]}</b><br>
                <span style="color:var(--green)">${row[3]} ج.م</span><br>
                <small>متاح: ${row[4]}</small>
            </div>
        `,
                )
                .join("");
        }

        // إضافة منتج جديد
        async function saveProduct() {
            const name = document.getElementById("pName").value;
            const buy = parseFloat(document.getElementById("pPrice").value);
            const sell = parseFloat(document.getElementById("pSellPrice").value);
            const stock = parseInt(document.getElementById("pStock").value);

            if (!name || !buy || !sell) return alert("أكمل البيانات");

            await fetch(API, {
                method: "POST",
                body: JSON.stringify({
                    action: "add",
                    name,
                    price: buy,
                    sellPrice: sell,
                    stock,
                    profit: (sell - buy) * stock,
                }),
            });
            alert("تمت الإضافة");
            fetchStock();
        }

        // الكاشير
        function addToCart(name, price) {
            const item = cart.find((i) => i.name === name);
            if (item) item.quantity++;
            else cart.push({ name, price, quantity: 1 });
            renderCart();
        }

        function renderCart() {
            const list = document.getElementById("cartList");
            list.innerHTML = cart
                .map(
                    (i) => `
            <div class="cart-item">
                <span>${i.name} (x${i.quantity})</span>
                <span>${i.price * i.quantity} ج.م</span>
            </div>
        `,
                )
                .join("");
            const total = cart.reduce((s, i) => s + i.price * i.quantity, 0);
            document.getElementById("grandTotal").innerText = total;
        }

        // إتمام البيع
        async function confirmSale() {
            if (cart.length === 0) return;
            const btn = document.querySelector(".btn-pay");
            btn.innerText = "جاري التحديث...";
            btn.disabled = true;

            await fetch(API, {
                method: "POST",
                body: JSON.stringify({ action: "sell", items: cart }),
            });

            alert("تم البيع وتحديث المخزن بنجاح!");
            cart = [];
            renderCart();
            fetchStock();
            btn.innerText = "تأكيد العملية وخصم المخزن";
            btn.disabled = false;
        }

        window.onload = fetchStock;
    </script>
</body>

</html>
